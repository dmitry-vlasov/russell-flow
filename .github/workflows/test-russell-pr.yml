on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: ["master"]

concurrency:
  group: run-tests

jobs:
  russell-tests:
    runs-on: [self-hosted, linux, x64]

    permissions:
      contents: read
      packages: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: 'Set up Docker'
        uses: ./.github/actions/with-docker
        with:
          container-name: kevm-ci-concrete-${{ github.sha }}

      # Fast smoke test FIRST: translates a small set.mm prefix and runs every
      # major command (reprove with oracle/bfs/spr, compress,
      # measure-autoprovability, annotate-proof, make-benchmark,
      # optimize-imports, verify) with strict assertions. Runs in ~1 min and
      # gives quick feedback; catches regressions — including wrong-value ones,
      # not just crashes — in commands the slow full-set steps never exercise.
      - name: 'Smoke test: all major commands on a small set.mm prefix'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj mm2ru2mm set-3000 && russellj smoke-test afile=set-3000'

      # Differential tactic-semantics test: proves that the corpus-guided tactics
      # (SPR, linear-guided) genuinely contribute — each pinned target reproves
      # with its tactic but is UNREACHABLE by bounded-BFS alone at ~3x budget.
      # Needs the set-100000 corpus (SPR/linear find nothing on smaller prefixes),
      # cut from the full set.mm with tools/mm-prefix.sh (a raw head -n is invalid
      # Metamath). See scripts/test-tactic-semantics.rus.
      - name: 'Tactic-semantics differential test (SPR / linear-guided vs BFS)'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'bash /app/russell-flow/tools/mm-prefix.sh /app/math/set.mm 100000 /app/math/set-100000.mm && russellj mm2ru2mm set-100000 && russellj mem=16g test-tactic-semantics afile=set-100000'

      - name: 'Run the tests on set.mm theorem base'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 30
          # Attempts are done because CI sometimes fail due to external reasons,
          # and instead of just failing, we may give tests a second chance.
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj mm2ru2mm set'

      - name: 'Reprove stratified sample of set.mm theorems with oracle'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj reprove-with-oracle set astride=50 time_limit=5m'

      - name: 'Reprove ioodvbdlimc1lem1 (large theorem stress test)'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj reprove-with-oracle-single set atheorem=ioodvbdlimc1lem1 time_limit=3m'

      - name: 'Run kore-fol roundtrip test'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj mm2ru2mm mm-theory/kore-fol'

      - name: 'Reprove all kore-fol theorems with oracle'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj reprove-with-oracle mm-theory/kore-fol time_limit=5m'

      - name: 'Tear down Docker container'
        if: always()
        run: |
          docker rm -f kevm-ci-concrete-${{ github.sha }} || true

