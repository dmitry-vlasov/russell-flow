on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: ["master"]

concurrency:
  group: run-tests

jobs:
  russell-tests:
    runs-on: [self-hosted, linux, x64]

    permissions:
      contents: read
      packages: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: 'Set up Docker'
        uses: ./.github/actions/with-docker
        with:
          container-name: kevm-ci-concrete-${{ github.sha }}

      # Scripting-language test FIRST: pure in-memory check of the embedded .rus
      # language itself (every basic type, operator, type operator and syntactic
      # construction). Needs no math library/dataset/config, runs in ~1s, and
      # fails loudly (exit 255) on any language regression. See
      # scripts/test/script-lang.rus.
      - name: 'Scripting-language test (types / operators / constructs)'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj test/script-lang'

      # Fast smoke test: translates a small set.mm prefix and runs every
      # major command (reprove with oracle/bfs/spr, compress,
      # measure-autoprovability, annotate-proof, make-benchmark,
      # optimize-imports, verify) with strict assertions. Runs in ~1 min and
      # gives quick feedback; catches regressions — including wrong-value ones,
      # not just crashes — in commands the slow full-set steps never exercise.
      # The set-3000 prefix is cut fresh with bin/mm-prefix.sh (like the refactor
      # / tactic steps) so it is self-contained and carries set.mm's $t
      # typesetting block — without it the translated sources render implication
      # as ASCII `->` instead of the unicode `→` the rest of the library uses.
      - name: 'Smoke test: all major commands on a small set.mm prefix'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'bash /app/russell-flow/bin/mm-prefix.sh /app/math/set.mm 3000 /app/math/set-3000.mm && russellj translate/mm2ru2mm set-3000 && russellj test/smoke afile=set-3000'

      # Unilambda test: eval (forward) + uneval (backward narrowing) across proof
      # terms over real assertions, recursive clauses (plus/mult), Horn logic
      # (append/3), and clauses over real Russell wff formulas. Reuses the
      # set-3000 sources produced by the smoke step (propositional calculus is in
      # any set prefix). Runs in ~1s. See scripts/test/uni.rus.
      - name: 'Unilambda test: eval + uneval over proof terms / clauses / real wff'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj test/uni afile=set-3000'

      # Refactor-commands test: applies every corpus-transforming refactor and
      # asserts the corpus still VERIFIES after each, plus pinned per-theorem
      # accuracy checks (a specific theorem must actually be generalized/shortened/
      # removed). Runs on set-30000 (~6s, 3150 theorems) for meaningful coverage —
      # cut from the full set.mm with bin/mm-prefix.sh. This is how the
      # remove-redundant-axioms and generalize-on-treefied-proofs crashes were
      # caught. See scripts/test/refactors.rus.
      - name: 'Refactor-commands test: apply each transform + re-verify'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'bash /app/russell-flow/bin/mm-prefix.sh /app/math/set.mm 30000 /app/math/set-30000.mm && russellj translate/mm2ru2mm set-30000 && russellj test/refactors afile=set-30000'

      # Differential tactic-semantics test: proves that the corpus-guided tactics
      # (SPR, linear-guided) genuinely contribute — each pinned target reproves
      # with its tactic but is UNREACHABLE by bounded-BFS alone at ~3x budget.
      # Needs the set-100000 corpus (SPR/linear find nothing on smaller prefixes),
      # cut from the full set.mm with bin/mm-prefix.sh (a raw head -n is invalid
      # Metamath). See scripts/test/tactic-semantics.rus.
      - name: 'Tactic-semantics differential test (SPR / linear-guided vs BFS)'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'bash /app/russell-flow/bin/mm-prefix.sh /app/math/set.mm 100000 /app/math/set-100000.mm && russellj translate/mm2ru2mm set-100000 && russellj mem=16g test/tactic-semantics afile=set-100000'

      - name: 'Run the tests on set.mm theorem base'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 30
          # Attempts are done because CI sometimes fail due to external reasons,
          # and instead of just failing, we may give tests a second chance.
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj translate/mm2ru2mm set'

      - name: 'Reprove stratified sample of set.mm theorems with oracle'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj reprove/oracle set astride=50 time_limit=5m'

      - name: 'Reprove ioodvbdlimc1lem1 (large theorem stress test)'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj reprove/oracle-single set atheorem=ioodvbdlimc1lem1 time_limit=3m'

      - name: 'Run kore-fol roundtrip test'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj translate/mm2ru2mm mm-theory/kore-fol'

      - name: 'Reprove all kore-fol theorems with oracle'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 2
          retry_on: error
          command: |
            docker exec \
              -u test-user \
              --workdir /app/math \
              kevm-ci-concrete-${{ github.sha }} \
              /bin/bash -c 'russellj reprove/oracle mm-theory/kore-fol time_limit=5m'

      - name: 'Tear down Docker container'
        if: always()
        run: |
          docker rm -f kevm-ci-concrete-${{ github.sha }} || true

